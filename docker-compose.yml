version: '3.8'

services:
  auto-vote-rating:
    build: .
    container_name: auto-vote-rating
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=UTC
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=8080
      - DATA_DIR=/app/data
      - HEADLESS=true
      - DEBUG=false
      - BROWSER_TIMEOUT=30000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
